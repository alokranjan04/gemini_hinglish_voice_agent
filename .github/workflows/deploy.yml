name: Deploy Priya to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}
  REGION:      asia-south1                    # Mumbai — lowest latency for India calls
  SERVICE:     priya-agent
  REGISTRY:    asia-south1-docker.pkg.dev
  IMAGE:       asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/priya/priya-agent

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # required for Workload Identity Federation (if used)

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. Configure Docker to push to Artifact Registry ─────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────────
      - name: Build image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push to Artifact Registry ─────────────────────────────────────
      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────────
      #
      # GOOGLE_CREDENTIALS is stored in GCP Secret Manager (not as env var)
      # to avoid JSON/comma issues in --set-env-vars.
      # All other secrets are plain strings and safe to pass as env vars.
      #
      # One-time setup required (see README — Cloud Run Setup):
      #   gcloud secrets create google-credentials --data-file=google-credentials.json
      #   gcloud secrets add-iam-policy-binding google-credentials \
      #     --member="serviceAccount:SA_EMAIL" --role="roles/secretmanager.secretAccessor"
      #
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=5050 \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --session-affinity \
            --set-secrets="GOOGLE_CREDENTIALS=google-credentials:latest" \
            --set-env-vars="\
          SARVAM_API_KEY=${{ secrets.SARVAM_API_KEY }},\
          DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }},\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          GOOGLE_CALENDAR_ID=${{ secrets.GOOGLE_CALENDAR_ID }},\
          GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }},\
          GMAIL_USER=${{ secrets.GMAIL_USER }},\
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }},\
          DOCTOR_EMAIL=${{ secrets.DOCTOR_EMAIL }}"

      # ── 8. Print deployed URL ─────────────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "✅ Deployed: $URL"
          echo "   Answer URL for Vobiz: $URL/answer"
          echo "   Dashboard: $URL/"
