name: Deploy Priya to Compute Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION:   us-central1
  SERVICE_NAME: priya-agent
  # Artifact Registry path for your project
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/priya-repo/priya-agent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Create Artifact Repository (if missing)
        run: |
          gcloud artifacts repositories create priya-repo \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Priya Voice Agent Repository" || true

      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/testcnx-169610/priya-repo/priya-agent:latest .
          docker push us-central1-docker.pkg.dev/testcnx-169610/priya-repo/priya-agent:latest

      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCE_INSTANCE_IP }}
          username: deploy-agent
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Authenticate 
            gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
            
            # Cleanup space
            docker system prune -f
            
            # Pull and Update
            docker pull us-central1-docker.pkg.dev/testcnx-169610/priya-repo/priya-agent:latest
            docker stop priya-agent || true
            docker rm priya-agent || true
            
            # The Final Run
            docker run -d --name priya-agent --restart always -p 5050:5050 -e SARVAM_API_KEY="${{ secrets.SARVAM_API_KEY }}" -e DEEPGRAM_API_KEY="${{ secrets.DEEPGRAM_API_KEY }}" -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" -e GOOGLE_SPREADSHEET_ID="${{ secrets.GOOGLE_SPREADSHEET_ID }}" -e GOOGLE_CALENDAR_ID="${{ secrets.GOOGLE_CALENDAR_ID }}" -e GMAIL_USER="${{ secrets.GMAIL_USER }}" -e GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}" -e DOCTOR_EMAIL="${{ secrets.DOCTOR_EMAIL }}" -e GOOGLE_CREDENTIALS='${{ secrets.GCP_SA_KEY }}' us-central1-docker.pkg.dev/testcnx-169610/priya-repo/priya-agent:latest
            
            docker image prune -f
