name: Deploy Priya to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGION:   asia-south1
  SERVICE:  priya-agent
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE:    asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/priya/priya-agent

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. Configure Docker ───────────────────────────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────────
      - name: Build image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push to Artifact Registry ─────────────────────────────────────
      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ────────────────────────────────────────────
      # Secrets are injected as step env vars first, then assembled into a
      # clean comma-separated string — avoids all shell quoting/newline issues.
      # GOOGLE_CREDENTIALS comes from GCP Secret Manager (JSON-safe, no commas).
      - name: Deploy to Cloud Run
        env:
          SARVAM_API_KEY:       ${{ secrets.SARVAM_API_KEY }}
          DEEPGRAM_API_KEY:     ${{ secrets.DEEPGRAM_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CALENDAR_ID:   ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          DOCTOR_EMAIL:         ${{ secrets.DOCTOR_EMAIL }}
        run: |
          ENV_VARS="SARVAM_API_KEY=${SARVAM_API_KEY}"
          ENV_VARS="${ENV_VARS},DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}"
          ENV_VARS="${ENV_VARS},GEMINI_API_KEY=${GEMINI_API_KEY}"
          ENV_VARS="${ENV_VARS},GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}"
          ENV_VARS="${ENV_VARS},GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}"
          ENV_VARS="${ENV_VARS},GMAIL_USER=${GMAIL_USER}"
          ENV_VARS="${ENV_VARS},GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}"
          ENV_VARS="${ENV_VARS},DOCTOR_EMAIL=${DOCTOR_EMAIL}"

          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=5050 \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --session-affinity \
            --set-secrets="GOOGLE_CREDENTIALS=google-credentials:latest" \
            --set-env-vars="${ENV_VARS}"

      # ── 8. Print deployed URL ─────────────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "✅ Deployed: $URL"
          echo "   Vobiz Answer URL : $URL/answer"
          echo "   Dashboard        : $URL/"
