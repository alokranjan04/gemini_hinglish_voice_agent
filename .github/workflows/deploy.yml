name: Deploy Priya to Compute Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION:   us-central1
  SERVICE_NAME: priya-agent
  # Artifact Registry path for your project
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/priya-repo/priya-agent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Create Artifact Repository (if missing)
        run: |
          gcloud artifacts repositories create priya-repo \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Priya Voice Agent Repository" || true

      - name: Build and Push Docker Image
        run: |
          # Convert IMAGE_NAME to lowercase to avoid Docker naming errors
          LOWER_IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker build -t $LOWER_IMAGE_NAME:latest .
          docker push $LOWER_IMAGE_NAME:latest
          # Store the lowercase name for the next step
          echo "IMAGE_NAME_LOWER=$LOWER_IMAGE_NAME" >> $GITHUB_ENV

      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCE_INSTANCE_IP }}
          username: deploy-agent
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure the image name is strictly lowercase and trimmed
            RAW_IMAGE_NAME="${{ env.IMAGE_NAME }}"
            IMAGE_NAME_LOWER=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]' | xargs)
            
            # Authenticate Docker
            gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
            
            # Cleanup space
            docker system prune -f
            
            # Pull and Run
            docker pull $IMAGE_NAME_LOWER:latest
            docker stop ${{ env.SERVICE_NAME }} || true
            docker rm ${{ env.SERVICE_NAME }} || true
            
            docker run -d --name ${{ env.SERVICE_NAME }} --restart always -p 5050:5050 -e SARVAM_API_KEY="${{ secrets.SARVAM_API_KEY }}" -e DEEPGRAM_API_KEY="${{ secrets.DEEPGRAM_API_KEY }}" -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" -e GOOGLE_SPREADSHEET_ID="${{ secrets.GOOGLE_SPREADSHEET_ID }}" -e GOOGLE_CALENDAR_ID="${{ secrets.GOOGLE_CALENDAR_ID }}" -e GMAIL_USER="${{ secrets.GMAIL_USER }}" -e GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}" -e DOCTOR_EMAIL="${{ secrets.DOCTOR_EMAIL }}" -e GOOGLE_CREDENTIALS='${{ secrets.GCP_SA_KEY }}' $IMAGE_NAME_LOWER:latest
            
            docker image prune -f
