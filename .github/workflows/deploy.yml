name: Deploy Priya to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION:   asia-south1
  SERVICE:  priya-agent
  REGISTRY: asia-south1-docker.pkg.dev
  IMAGE:    asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/priya/priya-agent

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. Configure Docker ───────────────────────────────────────────────
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────────
      - name: Build image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --cache-from ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push to Artifact Registry ─────────────────────────────────────
      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Write env vars file ────────────────────────────────────────────
      # Use a YAML file instead of --set-env-vars to safely handle values
      # that contain spaces (e.g. Gmail App Passwords: "xxxx xxxx xxxx xxxx")
      - name: Write env vars file
        env:
          SARVAM_API_KEY:        ${{ secrets.SARVAM_API_KEY }}
          DEEPGRAM_API_KEY:      ${{ secrets.DEEPGRAM_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CALENDAR_ID:    ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          DOCTOR_EMAIL:          ${{ secrets.DOCTOR_EMAIL }}
        run: |
          python3 - << 'PYEOF'
          import yaml, os
          keys = [
              'SARVAM_API_KEY', 'DEEPGRAM_API_KEY', 'GEMINI_API_KEY',
              'GOOGLE_CALENDAR_ID', 'GOOGLE_SPREADSHEET_ID',
              'GMAIL_USER', 'GMAIL_APP_PASSWORD', 'DOCTOR_EMAIL',
          ]
          env = {k: os.environ[k] for k in keys}
          with open('/tmp/env-vars.yaml', 'w') as f:
              yaml.dump(env, f, default_flow_style=False, allow_unicode=True)
          print("env-vars.yaml written with keys:", list(env.keys()))
          PYEOF

      # ── 8. Deploy to Cloud Run ────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=5050 \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --session-affinity \
            --set-secrets="GOOGLE_CREDENTIALS=google-credentials:latest" \
            --env-vars-file=/tmp/env-vars.yaml

      # ── 9. Print deployed URL ─────────────────────────────────────────────
      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "✅ Deployed: $URL"
          echo "   Vobiz Answer URL : $URL/answer"
          echo "   Dashboard        : $URL/"
