# ── Priya Voice Agent — nginx site config ─────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/priya
# Then: sudo ln -s /etc/nginx/sites-available/priya /etc/nginx/sites-enabled/priya
#
# Replace YOUR_DOMAIN with your actual domain (e.g. priya.nehachildcare.in)
# SSL certificates are managed by certbot (Let's Encrypt)

# Rate limiting — max 10 calls/min per IP on the webhook endpoint
limit_req_zone $binary_remote_addr zone=vobiz_limit:10m rate=10r/m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    # ── SSL (managed by certbot) ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";

    # ── Gzip (dashboard + metrics pages) ──────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Vobiz webhook: POST /answer ────────────────────────────────────────
    # Rate limited — Vobiz fires this once per incoming call
    location /answer {
        limit_req zone=vobiz_limit burst=5 nodelay;

        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket streams: /sarvam-stream and /gemini-stream ──────────────
    # These are long-lived connections (up to 1 hour per call)
    location ~* ^/(sarvam|gemini)-stream {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — critical
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Long timeouts — a call can last up to 1 hour
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── Dashboard, metrics, recordings, API ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
